<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Skylang Voice</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">

<link rel="icon" href="/static/icon.png">
<link rel="apple-touch-icon" href="/static/icon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

  <div class="topbar">
    <div class="title">Skylang Voice</div>
  </div>

  <textarea id="text" placeholder="輸入文字..."></textarea>

  <div class="islands">
    <button onclick="setIsland('forest')">森林島</button>
    <button onclick="setIsland('plain')">平原島</button>
    <button onclick="setIsland('mine')">礦山島</button>
    <button onclick="setIsland('beach')">沙灘島</button>
  </div>

  <div class="actions">
    <button id="playBtn" onclick="speak()">播放</button>
  </div>

  <!-- 🔥 完全隱藏播放器 -->
  <audio id="player" hidden></audio>

</div>

<script src="/static/app.js"></script>

</body>
</html>
