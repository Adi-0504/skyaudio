<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Skylang Voice</title>

  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="card">

  <h2>Skylang Voice</h2>

  <textarea id="text" placeholder="輸入框"></textarea>

  <select id="island">
    <option value="forest">🌲 森林島</option>
    <option value="plain">🌾 平原島</option>
    <option value="mine">⛏ 礦山島</option>
    <option value="beach">🏖 沙灘島</option>
  </select>

  <div class="btns">
    <button onclick="speak()">播放 ▶</button>
  </div>

  <audio id="player" controls></audio>

</div>

<script src="/static/app.js"></script>

</body>
</html>
